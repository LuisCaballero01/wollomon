name: build

on: [push, pull_request]
jobs:
  wollok-ts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - run: |
          npm install -g @uqbar/wollok-ts-cli
        shell: bash
        name: Setup Wollok CLI
      - run: wollok-ts-cli test --skipValidations -p ./
        name: Run tests
